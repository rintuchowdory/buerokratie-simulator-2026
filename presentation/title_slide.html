<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bürokratie-Simulator 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #003366 0%, #004d99 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        .slide-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: #0284C7;
        }
        
        .content-left {
            flex: 1;
            padding: 80px 60px;
            color: white;
            z-index: 2;
        }
        
        .content-right {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            gap: 20px;
        }
        
        .title {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 64px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 32px;
            font-weight: 300;
            line-height: 1.4;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        
        .status-badge {
            display: inline-block;
            background: #0284C7;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        
        .meta-info {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            font-weight: 300;
            line-height: 1.8;
            opacity: 0.85;
        }
        
        .meta-info div {
            margin-bottom: 12px;
        }
        
        .accent-block {
            width: 120px;
            height: 120px;
            background: #0284C7;
            border-radius: 4px;
            opacity: 0.3;
        }
        
        .accent-block-2 {
            width: 80px;
            height: 80px;
            background: #E2E8F0;
            border-radius: 4px;
            opacity: 0.2;
        }
        
        .icon-circle {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #0284C7;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-left">
            <div class="title">Bürokratie-<br>Simulator 2026</div>
            <div class="subtitle">An Interactive Satire of Government Administration</div>
            <div class="status-badge">✓ Complete & Live</div>
            <div class="meta-info">
                <div><strong>Team:</strong> Manus AI Development</div>
                <div><strong>Date:</strong> June 2026</div>
                <div><strong>Status:</strong> Production Ready</div>
            </div>
        </div>
        
        <div class="content-right">
            <div class="icon-circle">
                <i class="fas fa-building"></i>
            </div>
            <div class="accent-block"></div>
            <div class="accent-block-2"></div>
        </div>
    </div>
</body>
</html>
